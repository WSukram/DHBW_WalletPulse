spring.application.name=backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/walletpulse
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OpenAPI
springdoc.api-docs.path=/v3/api-docs

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT
jwt.secret=change_this_in_production
jwt.expiration=600000

# CoinGecko (optional, increases rate limit)
coingecko.api.key=

# Etherscan (ETH blockchain import)
etherscan.api.url=https://api.etherscan.io/v2/api
etherscan.api.key=

# Helius (SOL blockchain import)
helius.api.key=
