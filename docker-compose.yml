version: '3.8'

services:
  db:
    image: postgres:15
    container_name: walletpulse-db
    environment:
      POSTGRES_DB: walletpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: walletpulse-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/walletpulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRATION: 600000
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: walletpulse-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
