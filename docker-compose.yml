version: '3.8'

services:
  db:
    image: postgres:15
    container_name: walletpulse-db
    environment:
      POSTGRES_DB: walletpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: walletpulse-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/walletpulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRATION: 600000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/market/prices || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: walletpulse-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
